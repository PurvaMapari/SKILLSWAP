<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SkillSwap</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.10);
      --ink: #f0ece6; --ink2: #b8b0a6; --ink3: #7a7068;
      --flame: #f97316; --flame-lt: #fb923c;
      --font-head: 'Syne', sans-serif; --font-body: 'Instrument Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .login-card {
      width: 100%; max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(249,115,22,0.08); pointer-events: none;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 40px; height: 40px; background: var(--flame);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 22px; height: 22px; }
    .brand-name {
      font-family: var(--font-head); font-size: 1.2rem;
      font-weight: 800; letter-spacing: -0.03em;
    }

    .login-title {
      font-family: var(--font-head); font-size: 1.8rem;
      font-weight: 800; letter-spacing: -0.04em; margin-bottom: 4px;
    }
    .login-sub {
      font-size: 0.85rem; color: var(--ink3); margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink3); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--ink);
      font-family: var(--font-body); font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--flame); }

    .btn-login {
      width: 100%; padding: 13px;
      background: var(--flame); color: #1a0a00;
      border: none; border-radius: 100px;
      font-family: var(--font-head); font-size: 0.9rem;
      font-weight: 800; cursor: pointer;
      transition: all 0.2s; margin-top: 0.5rem;
    }
    .btn-login:hover {
      background: var(--flame-lt);
      box-shadow: 0 0 24px rgba(249,115,22,0.35);
    }

    .alert {
      display: none; padding: 10px 14px;
      border-radius: 10px; font-size: 0.82rem;
      font-weight: 600; margin-bottom: 1rem;
    }
    .alert-error {
      background: rgba(248,113,113,0.1);
      color: #f87171; border: 1px solid rgba(248,113,113,0.25);
    }

    .back-link {
      display: block; text-align: center; margin-top: 1.5rem;
      font-size: 0.8rem; color: var(--ink3);
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--flame-lt); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4C9.8 4 8 5.8 8 8s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm-7 14c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="#1a0a00" stroke-width="2" stroke-linecap="round"/>
          <path d="M5 12c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm14 0c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z" fill="#1a0a00"/>
        </svg>
      </div>
      <span class="brand-name">SkillSwap</span>
    </div>

    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">Sign in to manage your platform</p>

    <div class="alert alert-error" id="errorAlert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="username" placeholder="Enter admin username" required autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <a href="../index.html" class="back-link">← Back to SkillSwap</a>
  </div>

  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('skillswap_admin')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('errorAlert');
      errEl.style.display = 'none';

      fetch('../api/admin.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'login', username, password })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          sessionStorage.setItem('skillswap_admin', res.token);
          window.location.href = 'dashboard.html';
        } else {
          errEl.textContent = res.message;
          errEl.style.display = 'block';
        }
      })
      .catch(() => {
        errEl.textContent = 'Server error. Please try again.';
        errEl.style.display = 'block';
      });
    });
  </script>
</body>
</html>
