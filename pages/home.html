  <style>
    /* ── HOME PAGE SPECIFIC ── */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Nav-center pill styles */
    .nav-center {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-center a {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink3);
      padding: 6px 14px;
      border-radius: var(--r-btn);
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .nav-center a:hover {
      color: var(--flame-lt);
      border: 1px solid var(--flame);
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.25);
      background: transparent;
    }

    .nav-center a.active {
      background: var(--flame);
      color: #1a0a00;
      font-weight: 700;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
    }

    .home-logout {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      z-index: 10;
    }

    .btn-nav-logout {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--ink3);
      border: 1px solid transparent;
      border-radius: var(--r-btn);
      padding: 6px 16px;
      transition: all 0.2s;
    }

    .btn-nav-logout:hover {
      color: var(--flame-lt);
      border-color: var(--flame);
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.25);
      background: transparent;
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
    }

    @media (max-width: 900px) {
      .nav-center {
        display: none;
      }

      .nav-toggle {
        display: flex;
      }
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: stretch;
    }

    /* ── NEW HERO DESIGN ── */
    .hero-card {
      position: relative;
      width: 100%;
      background: linear-gradient(160deg, #0a0a0a 0%, #111111 30%, #0f0d0b 60%, #0e0e0e 100%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem 3.5rem;
      min-height: calc(100vh - 66px);
    }

    /* Subtle grid overlay */
    .hero-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 1;
    }

    /* Ambient glow effects */
    .hero-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 40%, rgba(249, 115, 22, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 500px 500px at 80% 60%, rgba(251, 191, 36, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 50% 80%, rgba(249, 115, 22, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 1;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(249, 115, 22, 0.08);
      top: 10%;
      left: 5%;
      animation: floatOrb1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 250px;
      height: 250px;
      background: rgba(251, 191, 36, 0.06);
      bottom: 15%;
      right: 8%;
      animation: floatOrb2 15s ease-in-out infinite;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: rgba(249, 115, 22, 0.05);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: floatOrb3 10s ease-in-out infinite;
    }

    @keyframes floatOrb1 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      33% {
        transform: translate(30px, -20px);
      }

      66% {
        transform: translate(-20px, 15px);
      }
    }

    @keyframes floatOrb2 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      33% {
        transform: translate(-25px, 20px);
      }

      66% {
        transform: translate(15px, -30px);
      }
    }

    @keyframes floatOrb3 {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.2);
      }
    }

    /* Doodle icons */
    .doodles {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .doodle {
      position: absolute;
      opacity: 0.07;
      stroke: var(--flame);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: cardIn 0.7s ease forwards;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-subtitle {
      font-family: var(--font-body);
      font-size: clamp(0.9rem, 1.8vw, 1.2rem);
      font-weight: 500;
      color: var(--ink3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .card-brand {
      font-family: var(--font-head);
      font-size: clamp(3.2rem, 9vw, 8.5rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
      margin-bottom: 2.5rem;
      user-select: none;
      white-space: nowrap;
      background: linear-gradient(135deg, var(--flame) 0%, var(--amber) 50%, var(--flame-lt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(249, 115, 22, 0.2));
    }

    .card-actions {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      width: 100%;
      max-width: 480px;
    }

    .card-action-btn {
      flex: 1;
      padding: 0.95rem 1.2rem;
      background: rgba(249, 115, 22, 0.08);
      backdrop-filter: blur(12px);
      color: var(--ink);
      border: 1px solid rgba(249, 115, 22, 0.2);
      font-family: var(--font-head);
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: var(--r-btn);
      cursor: pointer;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      display: block;
    }

    .card-action-btn:hover {
      background: var(--flame);
      color: #1a0a00;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(249, 115, 22, 0.35);
      border-color: var(--flame);
    }

    .site-footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.78rem;
      color: var(--ink4);
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }

    @media (max-width: 768px) {
      .hero-card {
        padding: 2rem 1.2rem 2.5rem;
      }

      .card-actions {
        max-width: 320px;
      }

      .card-action-btn {
        font-size: 0.85rem;
      }

      .card-brand {
        white-space: normal;
        word-break: break-word;
      }
    }
  </style>
</head>
