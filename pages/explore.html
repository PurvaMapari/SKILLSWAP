<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Skills — SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@500;600&display=swap"
    rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --bg4: #232323;
      --border: rgba(255, 255, 255, 0.06);
      --border2: rgba(255, 255, 255, 0.10);
      --ink: #f0ece6;
      --ink2: #b8b0a6;
      --ink3: #7a7068;
      --ink4: #3d3830;
      --flame: #f97316;
      --flame-dk: #c2530a;
      --flame-lt: #fb923c;
      --flame-glow: rgba(249, 115, 22, 0.18);
      --flame-glow2: rgba(249, 115, 22, 0.06);
      --font-head: 'Syne', sans-serif;
      --font-body: 'Instrument Sans', sans-serif;
      --r-btn: 100px;
      --nav-h: 66px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2.5rem;
      background: rgba(13, 13, 13, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--flame);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
    }

    .logo-name {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-center a {
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--ink3);
      padding: 7px 15px;
      border-radius: var(--r-btn);
      transition: all 0.2s;
    }

    .nav-center a:hover {
      color: var(--ink);
    }

    .nav-center a.active {
      background: var(--flame);
      color: #1a0a00;
      font-weight: 700;
    }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .nav-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--ink2);
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .nav-avatar:hover {
      border-color: var(--flame);
    }

    .nav-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── HERO ── */
    .hero-bar {
      position: relative;
      overflow: hidden;
      padding: 5rem 2rem 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--flame);
    }

    /* radial glow layers */
    .hero-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 80% at 50% 110%, rgba(0, 0, 0, 0.35) 0%, transparent 70%);
    }

    .hero-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 60% at 80% -10%, rgba(255, 255, 255, 0.12) 0%, transparent 60%);
    }

    /* animated blob */
    .hero-blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-blob-1 {
      width: 500px;
      height: 500px;
      bottom: -220px;
      left: -120px;
      background: rgba(0, 0, 0, 0.1);
      animation: blobDrift 12s ease-in-out infinite alternate;
    }

    .hero-blob-2 {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -60px;
      background: rgba(255, 255, 255, 0.08);
      animation: blobDrift 9s ease-in-out infinite alternate-reverse;
    }

    @keyframes blobDrift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(20px, 15px) scale(1.06);
      }
    }

    .hero-bar-inner {
      max-width: 560px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(26, 10, 0, 0.55);
      margin-bottom: 1rem;
    }

    .hero-eyebrow span {
      width: 24px;
      height: 1px;
      background: rgba(26, 10, 0, 0.35);
      display: inline-block;
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(3.2rem, 7vw, 5.5rem);
      font-weight: 800;
      color: #1a0a00;
      letter-spacing: -0.05em;
      line-height: 0.92;
      margin-bottom: 1rem;
    }

    .hero-subtitle {
      font-size: 0.92rem;
      color: rgba(26, 10, 0, 0.6);
      margin-bottom: 2rem;
      font-weight: 500;
    }

    /* Search */
    .hero-search {
      display: flex;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.08);
      background: var(--bg2);
    }

    .hero-search-input {
      flex: 1;
      padding: 1rem 1.4rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      border: none;
      outline: none;
      background: transparent;
      color: var(--ink);
      min-width: 0;
    }

    .hero-search-input::placeholder {
      color: var(--ink3);
    }

    .hero-search-btn {
      background: var(--flame);
      border: none;
      padding: 0 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .hero-search-btn:hover {
      background: var(--flame-dk);
    }

    .hero-search-btn svg {
      width: 18px;
      height: 18px;
      stroke: #1a0a00;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    /* ── CATEGORY BAR ── */
    .categories-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 2.5rem;
      position: sticky;
      top: var(--nav-h);
      z-index: 90;
    }

    .categories-inner {
      max-width: 1140px;
      margin: 0 auto;
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .categories-inner::-webkit-scrollbar {
      display: none;
    }

    .categories-inner .sort-select {
      flex-shrink: 0;
    }

    .cat-pill {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: var(--r-btn);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--ink3);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .cat-pill:hover {
      color: var(--ink);
      border-color: rgba(249, 115, 22, 0.35);
      background: var(--flame-glow2);
    }

    .cat-pill.active {
      background: var(--flame);
      border-color: var(--flame);
      color: #1a0a00;
      font-weight: 700;
      box-shadow: 0 0 18px rgba(249, 115, 22, 0.25);
    }

    .sort-select {
      margin-left: auto;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--ink2);
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 16px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .sort-select:focus {
      border-color: var(--flame);
    }

    .sort-select option {
      background: var(--bg2);
    }

    /* ── MAIN ── */
    .main-content {
      flex: 1;
      max-width: 1140px;
      margin: 0 auto;
      width: 100%;
      padding: 2.5rem 2.5rem;
    }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.6rem;
    }

    .results-info {
      font-size: 0.82rem;
      color: var(--ink3);
    }

    .results-info span {
      font-weight: 700;
      color: var(--ink);
    }

    /* ── SKILL CARDS ── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
      margin-bottom: 3rem;
    }

    .skill-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    /* glow dot top-right */
    .skill-card::after {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--flame-glow);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* left accent bar */
    .skill-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 3px;
      background: linear-gradient(180deg, var(--flame), var(--flame-lt));
      border-radius: 0 3px 3px 0;
      transform: scaleY(0);
      transform-origin: center;
      transition: transform 0.25s ease;
    }

    .skill-card:hover {
      border-color: rgba(249, 115, 22, 0.28);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(249, 115, 22, 0.1);
      transform: translateY(-4px);
    }

    .skill-card:hover::before {
      transform: scaleY(1);
    }

    .skill-card:hover::after {
      opacity: 1;
    }

    .skill-card-category {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--flame);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .skill-card-category::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--flame);
      flex-shrink: 0;
    }

    .skill-card-title {
      font-family: var(--font-head);
      font-size: 1.08rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.2;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .swap-arrow {
      color: var(--ink4);
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .skill-offered {
      color: var(--flame-lt);
    }

    .skill-card-desc {
      font-size: 0.82rem;
      color: var(--ink3);
      line-height: 1.65;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .skill-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .skill-card-teacher {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .teacher-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--bg4), var(--bg3));
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--flame-lt);
      flex-shrink: 0;
    }

    .teacher-name {
      font-size: 0.78rem;
      color: var(--ink3);
    }

    .skill-card-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--flame);
      font-size: 0.8rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .skill-card:hover .skill-card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      background: var(--bg2);
      border: 1px dashed var(--border2);
      border-radius: 18px;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .empty-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1rem;
      color: var(--ink2);
      margin-bottom: 6px;
    }

    .empty-sub {
      font-size: 0.82rem;
      color: var(--ink3);
    }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.78rem;
      color: var(--ink4);
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .skill-card {
      animation: fadeUp 0.4s ease both;
    }

    /* stagger via nth-child */
    .skill-card:nth-child(1) {
      animation-delay: 0.04s;
    }

    .skill-card:nth-child(2) {
      animation-delay: 0.08s;
    }

    .skill-card:nth-child(3) {
      animation-delay: 0.12s;
    }

    .skill-card:nth-child(4) {
      animation-delay: 0.16s;
    }

    .skill-card:nth-child(5) {
      animation-delay: 0.20s;
    }

    .skill-card:nth-child(6) {
      animation-delay: 0.24s;
    }

    .skill-card:nth-child(7) {
      animation-delay: 0.28s;
    }

    .skill-card:nth-child(8) {
      animation-delay: 0.32s;
    }

    .skill-card:nth-child(9) {
      animation-delay: 0.36s;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .navbar {
        padding: 0 1.5rem;
      }

      .nav-center {
        display: none;
      }

      .hero-bar {
        padding: 3.5rem 1.5rem 3rem;
      }

      .categories-bar {
        padding: 0.8rem 1.5rem;
      }

      .main-content {
        padding: 2rem 1.5rem;
      }

      .skills-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      .skills-grid {
        grid-template-columns: 1fr;
      }

      .hero-title {
        font-size: 2.8rem;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../index.html" class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4C9.8 4 8 5.8 8 8s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm-7 14c0-3.3 3.1-6 7-6s7 2.7 7 6"
            stroke="#1a0a00" stroke-width="2" stroke-linecap="round" />
          <path
            d="M5 12c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm14 0c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"
            fill="#1a0a00" />
        </svg>
      </div>
      <span class="logo-name">SkillSwap</span>
    </a>

    <nav class="nav-center">
      <a href="home.html">Home</a>
      <a href="about.html">About</a>
      <a href="explore.html" class="active">Explore</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>

    <div class="nav-right">
      <a href="profile.html" class="nav-avatar" id="navAvatar" title="Profile"></a>
    </div>
  </nav>

  <script>
    (function () {
      var u = JSON.parse(localStorage.getItem('skillswap_user') || '{}');
      var el = document.getElementById('navAvatar');
      if (!el) return;
      var photo = localStorage.getItem('skillswap_avatar_' + (u.id || ''));
      if (photo) { el.innerHTML = '<img src="' + photo + '" alt="P">'; }
      else { el.textContent = (u.name || 'U').charAt(0).toUpperCase(); }
    })();
  </script>

  <!-- HERO -->
  <div class="hero-bar">
    <div class="hero-blob hero-blob-1"></div>
    <div class="hero-blob hero-blob-2"></div>
    <div class="hero-bar-inner">
      <div class="hero-eyebrow"><span></span>Skill Exchange Platform<span></span></div>
      <h1 class="hero-title">Explore<br>Skills</h1>
      <p class="hero-subtitle">Find skills to learn and connect with teachers</p>
      <div class="hero-search">
        <input type="text" class="hero-search-input" id="searchInput"
          placeholder="Search skills, categories, teachers...">
        <button class="hero-search-btn" id="searchBtn">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="categories-bar">
    <div class="categories-inner" id="categoryPills">
      <button class="cat-pill active" data-cat="all">All</button>
      <button class="cat-pill" data-cat="programming">💻 Programming</button>
      <button class="cat-pill" data-cat="design">🎨 Design</button>
      <button class="cat-pill" data-cat="music">🎵 Music</button>
      <button class="cat-pill" data-cat="marketing">📣 Marketing</button>
      <button class="cat-pill" data-cat="photography">📸 Photography</button>
      <button class="cat-pill" data-cat="business">💼 Business</button>
      <button class="cat-pill" data-cat="language">🗣️ Language</button>
      <button class="cat-pill" data-cat="fitness">🏋️ Fitness</button>
      <button class="cat-pill" data-cat="technology">🔧 Technology</button>
      <button class="cat-pill" data-cat="cooking">🍳 Cooking</button>
      <button class="cat-pill" data-cat="art">🎭 Art</button>
      <button class="cat-pill" data-cat="other">✨ Other</button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main-content">
    <div class="results-bar">
      <p class="results-info">Showing <span id="resultCount">0</span> skills</p>
      <select class="sort-select" id="sortSelect">
        <option value="default">Sort: Default</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
      </select>
    </div>
    <div class="skills-grid" id="skillsGrid"></div>
  </main>

  <footer class="site-footer">© 2025 SkillSwap. Exchange skills, not money.</footer>

  <!-- SCRIPTS -->
  <script>
    if (!localStorage.getItem('skillswap_user')) {
      window.location.href = '../signup.html';
    }

    const allCards = [];
    const resultCount = document.getElementById('resultCount');
    const grid = document.getElementById('skillsGrid');
    let activeCat = 'all', searchTerm = '';

    document.querySelectorAll('.cat-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        activeCat = pill.dataset.cat;
        applyFilters();
      });
    });

    const searchInput = document.getElementById('searchInput');
    function doSearch() {
      searchTerm = searchInput.value.toLowerCase().trim();
      if (searchTerm) {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        document.querySelector('[data-cat="all"]').classList.add('active');
        activeCat = 'all';
      }
      applyFilters();
    }
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    searchInput.addEventListener('input', doSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    document.getElementById('sortSelect').addEventListener('change', function () {
      const cards = Array.from(grid.querySelectorAll('.skill-card'));
      if (this.value === 'az') cards.sort((a, b) => a.querySelector('.skill-card-title').textContent.localeCompare(b.querySelector('.skill-card-title').textContent));
      else if (this.value === 'za') cards.sort((a, b) => b.querySelector('.skill-card-title').textContent.localeCompare(a.querySelector('.skill-card-title').textContent));
      else cards.sort((a, b) => allCards.indexOf(a) - allCards.indexOf(b));
      cards.forEach(c => grid.appendChild(c));
    });

    function applyFilters() {
      let visible = 0;
      const existing = grid.querySelector('.empty-state');
      if (existing) existing.remove();
      allCards.forEach(card => {
        const matchCat = activeCat === 'all' || card.dataset.cat === activeCat;
        const title = card.querySelector('.skill-card-title').textContent.toLowerCase();
        const desc = card.querySelector('.skill-card-desc').textContent.toLowerCase();
        const cat = card.querySelector('.skill-card-category').textContent.toLowerCase();
        const teacher = card.querySelector('.teacher-name').textContent.toLowerCase();
        const matchSearch = !searchTerm || title.includes(searchTerm) || desc.includes(searchTerm) || cat.includes(searchTerm) || teacher.includes(searchTerm);
        if (matchCat && matchSearch) { card.style.display = 'flex'; visible++; }
        else card.style.display = 'none';
      });
      resultCount.textContent = visible;
      if (visible === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `<div class="empty-icon">🔍</div><div class="empty-title">No skills found</div><div class="empty-sub">Try a different search or category</div>`;
        grid.appendChild(empty);
      }
    }

    const params = new URLSearchParams(window.location.search);
    const qParam = params.get('q');
    if (qParam) { searchInput.value = qParam; doSearch(); }
  </script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/main.js"></script>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('skillswap_user') || '{}');
    fetch(`../api/skills.php?viewer_id=${currentUser.id || 0}`)
      .then(res => res.json())
      .then(data => {
        if (!data.success) return;
        grid.innerHTML = '';
        data.data.forEach(skill => {
          if (parseInt(skill.user_id) === currentUser.id) return;

          const card = document.createElement('div');
          card.className = 'skill-card';
          card.dataset.cat = (skill.category || 'general').toLowerCase();

          card.innerHTML = `
            <div class="skill-card-category">${skill.category || 'General'}</div>
            <div class="skill-card-title">
              <span>${skill.skill_wanted}</span>
              <span class="swap-arrow">⇄</span>
              <span class="skill-offered">${skill.skill_offered}</span>
            </div>
            <div class="skill-card-desc">${skill.description || 'No description added.'}</div>
            <div class="skill-card-footer">
              <div class="skill-card-teacher">
                <div class="teacher-avatar">${skill.owner_name?.charAt(0) || 'U'}</div>
                <div class="teacher-name">${skill.owner_name || 'Unknown'}</div>
              </div>
              <div class="skill-card-arrow">→</div>
            </div>
          `;

          card.addEventListener('click', () => {
            window.location.href = `swap-detail.html?id=${skill.id}`;
          });

          grid.appendChild(card);
        });

        allCards.length = 0;
        allCards.push(...Array.from(document.querySelectorAll('.skill-card')));
        applyFilters();
      })
      .catch(err => console.error(err));
  </script>

</body>
